<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Full Sin — Gestão de Envios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; background: #ebebeb; color: #333333; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel para transformar JSX em runtime -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Ícones Lucide -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo } = React;

    // ═════════════════════════════════════════════════════════════════════════
    // CONFIGURAÇÃO DO GOOGLE SHEETS
    // ═════════════════════════════════════════════════════════════════════════
    const API_URL = "https://script.google.com/macros/s/AKfycbyphexDl4BvnuT7lTESg2oirH3ifj8LNKzDPr-SmlRfXi48phvrth1D8KiK4QltwRktAg/exec";
    const API_KEY = "fullsin-2026-xyz";

    // ═════════════════════════════════════════════════════════════════════════
    // ÍCONES (componentes SVG simples)
    // ═════════════════════════════════════════════════════════════════════════
    const Ico = ({ name, size = 16, color = "currentColor", stroke = 2, ...rest }) => {
      const i = window.lucide?.icons?.[name];
      if (!i) return null;
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
          viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={stroke}
          strokeLinecap="round" strokeLinejoin="round" {...rest}
          dangerouslySetInnerHTML={{ __html: i[2].map(([tag, attrs]) => {
            const a = Object.entries(attrs).map(([k,v])=>`${k}="${v}"`).join(' ');
            return `<${tag} ${a} />`;
          }).join('') }}
        />
      );
    };

    // Atalhos
    const Package = p => <Ico name="package" {...p}/>;
    const Truck = p => <Ico name="truck" {...p}/>;
    const ClipboardCheck = p => <Ico name="clipboard-check" {...p}/>;
    const UserCircle = p => <Ico name="user-circle" {...p}/>;
    const LayoutDashboard = p => <Ico name="layout-dashboard" {...p}/>;
    const Plus = p => <Ico name="plus" {...p}/>;
    const Search = p => <Ico name="search" {...p}/>;
    const Download = p => <Ico name="download" {...p}/>;
    const Trash2 = p => <Ico name="trash-2" {...p}/>;
    const Edit3 = p => <Ico name="edit-3" {...p}/>;
    const X = p => <Ico name="x" {...p}/>;
    const AlertTriangle = p => <Ico name="alert-triangle" {...p}/>;
    const CheckCircle2 = p => <Ico name="check-circle-2" {...p}/>;
    const Clock = p => <Ico name="clock" {...p}/>;
    const Filter = p => <Ico name="filter" {...p}/>;
    const Eye = p => <Ico name="eye" {...p}/>;
    const EyeOff = p => <Ico name="eye-off" {...p}/>;
    const Settings = p => <Ico name="settings" {...p}/>;
    const KeyRound = p => <Ico name="key-round" {...p}/>;
    const Check = p => <Ico name="check" {...p}/>;
    const ChevronDown = p => <Ico name="chevron-down" {...p}/>;
    const ChevronUp = p => <Ico name="chevron-up" {...p}/>;
    const ShieldCheck = p => <Ico name="shield-check" {...p}/>;
    const AlertOctagon = p => <Ico name="alert-octagon" {...p}/>;
    const FileText = p => <Ico name="file-text" {...p}/>;
    const Hash = p => <Ico name="hash" {...p}/>;

    // ═════════════════════════════════════════════════════════════════════════
    // TEMA, CONSTANTES, HELPERS (idênticos ao artefato principal)
    // ═════════════════════════════════════════════════════════════════════════
    const T = {
      yellow:"#ffe600", yellowDark:"#f0d000", yellowBg:"#fff9cc", yellowFg:"#7a6200",
      blue:"#3483fa", blueDark:"#2968c8", blueLight:"#e8f0fe", blueFg:"#1a4fa0",
      green:"#00a650", greenBg:"#e6f4ea", greenFg:"#006630",
      red:"#f23d4f", redBg:"#fce8e8", redFg:"#b0001a",
      orange:"#f29000", orangeBg:"#fff3e0", orangeFg:"#7a4500",
      purple:"#8b5cf6", purpleBg:"#ede9fe", purpleFg:"#5b21b6",
      pink:"#ec4899", pinkBg:"#fce7f3", pinkFg:"#9d174d",
      bg:"#ebebeb", card:"#ffffff", soft:"#f5f5f5",
      border:"#e0e0e0", borderStr:"#bdbdbd",
      fg:"#333333", fgMuted:"#666666", fgSoft:"#999999",
      grayBg:"#f0f0f0", grayFg:"#888888",
    };
    const font = "'Inter','Helvetica Neue',Arial,sans-serif";
    const rad = "4px", radLg = "6px";

    const COR_STATUS_COLETA = {
      "Em Preparação": { bg:T.yellowBg, fg:T.yellowFg },
      "Preparado": { bg:T.greenBg, fg:T.greenFg },
      "Conferido": { bg:T.blueLight, fg:T.blueFg },
      "Coletado": { bg:T.purpleBg, fg:T.purpleFg },
      "Entregue": { bg:T.pinkBg, fg:T.pinkFg },
      "Cancelado": { bg:T.redBg, fg:T.redFg },
    };
    const COR_PLANO = { "Pendente": { bg:T.yellowBg, fg:T.yellowFg }, "Confirmado": { bg:T.blueLight,fg:T.blueFg }, "Cancelado": { bg:T.redBg, fg:T.redFg } };
    const COR_TIPO_COLETA = { "Coleta ML": { bg:T.yellowBg, fg:T.yellowFg }, "Coleta SH": { bg:T.orangeBg, fg:T.orangeFg }, "Particular": { bg:T.greenBg, fg:T.greenFg } };
    const COR_MARKETPLACE = { "Mercado Livre": { bg:T.yellowBg, fg:T.yellowFg }, "Shopee": { bg:T.orangeBg, fg:T.orangeFg } };
    const COR_CONF = { "Pendente": { bg:T.yellowBg, fg:T.yellowFg }, "Tudo OK": { bg:T.greenBg, fg:T.greenFg }, "Divergência": { bg:T.redBg, fg:T.redFg } };
    const corBadge = (val, mapa) => (mapa && mapa[val]) ? mapa[val] : { bg:T.grayBg, fg:T.grayFg };

    const EMPRESAS_DEFAULT = ["Mavie","Mavie Tech","S.I.N","Super","Super Importados"];
    const MARKETPLACES_DEFAULT = ["Mercado Livre","Shopee"];
    const STATUS_PLANO = ["Pendente","Confirmado","Cancelado"];
    const TIPOS_COLETA = ["Coleta ML","Coleta SH","Particular"];
    const STATUS_COLETA = ["Em Preparação","Preparado","Conferido","Coletado","Entregue","Cancelado"];
    const STATUS_CONFERENCIA = ["Pendente","Tudo OK","Divergência"];
    const TIPOS_USUARIO = ["administrador","conferente","ajudante"];
    const LABEL_TIPO = { administrador:"Administrador", conferente:"Conferente", ajudante:"Ajudante" };
    const SENHA_ADMIN = "admin123";
    const LOCAIS_ML_SP = ["CD Cajamar - SP (FULL1)","CD Cajamar - SP (FULL2)","CD Franco da Rocha - SP","CD Louveira - SP","CD Araçariguama - SP","CD Perus - SP","CD Guarulhos - SP","CD Extrema - MG","CD São Paulo Capital"];
    const CD_PARTICULAR = "CD Sumaré - SP";

    const TODOS_CAMPOS = [
      {key:"empresa",label:"Cadastro"},{key:"envio",label:"Nº do Envio"},{key:"marketplace",label:"Marketplace"},
      {key:"qtde",label:"Quantidade"},{key:"embalador",label:"Embalador"},{key:"planoEnvio",label:"Plano de Envio"},
      {key:"reservar",label:"Data de Reserva"},{key:"horario",label:"Horário"},{key:"caixa",label:"Caixa"},
      {key:"tipoColeta",label:"Tipo de Coleta"},{key:"statusColeta",label:"Status da Coleta"},
      {key:"qtdeConferida",label:"Qtde Conferida"},{key:"diferenca",label:"Diferença"},
      {key:"statusConf",label:"Status Conferência"},{key:"local",label:"Local"},
      {key:"codAut",label:"Cód. Autorização"},{key:"motorista",label:"Nome do Motorista"},
      {key:"cpfCnpj",label:"CPF/CNPJ"},{key:"transportadora",label:"Transportadora"},{key:"placa",label:"Placa"},
    ];
    const PERMISSOES_PADRAO = {
      administrador: TODOS_CAMPOS.map(c=>c.key),
      conferente: ["embalador","caixa","statusColeta","qtdeConferida","diferenca","statusConf","local"],
      ajudante: ["embalador","caixa","statusColeta"],
    };

    // ─── API ─────────────────────────────────────────────────────────────────
    async function apiListAll() {
      const r = await fetch(API_URL + "?action=listAll&key=" + encodeURIComponent(API_KEY));
      const j = await r.json();
      if (j.erro) throw new Error(j.erro);
      return j.data || {};
    }
    async function apiSave(table, data) {
      await fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({ key:API_KEY, action:"save", table, data }) });
    }
    async function apiDelete(table, id) {
      await fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({ key:API_KEY, action:"delete", table, id }) });
    }
    async function apiReplaceAll(table, lista) {
      await fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({ key:API_KEY, action:"replaceAll", table, data:lista }) });
    }

    // ─── HELPERS ─────────────────────────────────────────────────────────────
    const hoje = () => new Date().toISOString().split("T")[0];
    const agora = () => new Date().toISOString();
    const novoId = () => Date.now().toString(36) + Math.random().toString(36).substr(2,5);
    const fmtData = d => { if(!d) return "—"; const p = String(d).split("T")[0].split("-"); return p[2]+"/"+p[1]+"/"+p[0]; };
    const fmtDH = d => { if(!d) return "—"; return new Date(d).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); };

    const envioVazio = () => ({
      id:novoId(), cadastro:"", envio:"", marketplace:"Mercado Livre", qtde:"",
      embalador:"", planoEnvio:"Pendente", reservar:"", horario:"", caixa:"",
      tipoColeta:"", statusColeta:"Em Preparação", qtdeConferida:"",
      statusConferencia:"Pendente", local:"", codAutorizacao:"", nomeMotorista:"",
      cpfCnpj:"", transportadora:"", placa:"", historico:false,
      criadoEm:agora(), editadoEm:""
    });

    // ─── ESTILOS ─────────────────────────────────────────────────────────────
    const s = {
      app: { minHeight:"100vh", background:T.bg, fontFamily:font, color:T.fg },
      topbar: { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 32px", height:"56px", background:T.yellow, borderBottom:"2px solid "+T.yellowDark },
      brandMark: { width:"36px", height:"36px", background:T.blue, color:"#fff", borderRadius:"50%", display:"grid", placeItems:"center", fontWeight:700, fontSize:"13px" },
      main: { padding:"24px 32px", maxWidth:"1600px" },
      card: { background:T.card, border:"1px solid "+T.border, borderRadius:radLg, padding:"20px", boxShadow:"0 1px 2px rgba(0,0,0,.08)" },
      field: { display:"flex", flexDirection:"column", gap:"5px" },
      lbl: { fontSize:"12px", color:T.fgMuted, fontWeight:500 },
      inp: { padding:"10px 12px", border:"1px solid "+T.borderStr, borderRadius:rad, background:T.card, fontFamily:font, fontSize:"14px", color:T.fg, outline:"none", width:"100%", boxSizing:"border-box" },
      readonly: { padding:"10px 12px", background:T.soft, border:"1px solid "+T.border, borderRadius:rad, fontSize:"14px", color:T.fgMuted },
      btnBlue: { display:"inline-flex", alignItems:"center", gap:"6px", background:T.blue, color:"#fff", border:"none", padding:"10px 18px", borderRadius:rad, fontSize:"14px", fontWeight:600, cursor:"pointer" },
      btnYellow: { display:"inline-flex", alignItems:"center", gap:"6px", background:T.yellow, color:T.fg, border:"1px solid "+T.yellowDark, padding:"10px 18px", borderRadius:rad, fontSize:"14px", fontWeight:600, cursor:"pointer" },
      btnGhost: { display:"inline-flex", alignItems:"center", gap:"6px", background:T.card, color:T.blue, border:"1px solid "+T.blue, padding:"10px 14px", borderRadius:rad, fontSize:"14px", fontWeight:500, cursor:"pointer" },
      btnGhostSm: { display:"inline-flex", alignItems:"center", gap:"6px", background:T.card, color:T.blue, border:"1px solid "+T.blue, padding:"6px 12px", borderRadius:rad, fontSize:"12px", fontWeight:500, cursor:"pointer" },
      iconBtn: { background:"transparent", border:"1px solid transparent", padding:"6px", borderRadius:rad, color:T.fgMuted, display:"inline-flex", alignItems:"center", cursor:"pointer" },
      overlay: { position:"fixed", inset:0, background:"rgba(0,0,0,.45)", display:"grid", placeItems:"center", zIndex:100, padding:"20px" },
      modal: { background:T.card, borderRadius:radLg, width:"100%", maxWidth:"720px", maxHeight:"90vh", display:"flex", flexDirection:"column", boxShadow:"0 8px 32px rgba(0,0,0,.18)" },
      modalHdr: { padding:"18px 24px", borderBottom:"1px solid "+T.border, display:"flex", justifyContent:"space-between", alignItems:"flex-start" },
      modalBody: { padding:"24px", overflowY:"auto", flex:1 },
      modalFoot: { padding:"14px 24px", borderTop:"1px solid "+T.border, display:"flex", justifyContent:"space-between", alignItems:"center", background:T.soft, borderRadius:"0 0 "+radLg+" "+radLg },
      th: { textAlign:"left", padding:"10px 14px", fontSize:"12px", color:T.fgMuted, fontWeight:600, borderBottom:"1px solid "+T.border, whiteSpace:"nowrap", background:T.soft },
      td: { padding:"11px 14px", borderBottom:"1px solid "+T.border, verticalAlign:"middle", color:T.fg, fontSize:"14px" },
      alertOk: { padding:"10px 12px", borderRadius:rad, fontSize:"13px", fontWeight:500, background:T.greenBg, color:T.greenFg },
      alertErr: { padding:"10px 12px", borderRadius:rad, fontSize:"13px", fontWeight:500, background:T.redBg, color:T.redFg },
    };

    // ─── COMPONENTES ─────────────────────────────────────────────────────────
    function Badge({ children, mapa }) {
      const cor = corBadge(children, mapa);
      return <span style={{ background:cor.bg, color:cor.fg, padding:"3px 10px", borderRadius:"999px", fontSize:"12px", fontWeight:600, whiteSpace:"nowrap", display:"inline-block" }}>{children||"—"}</span>;
    }
    function BadgeTipo({ tipo }) {
      const cores = { administrador:{bg:T.fg,fg:"#fff"}, conferente:{bg:T.blueLight,fg:T.blue}, ajudante:{bg:T.orangeBg,fg:T.orangeFg} };
      const cor = cores[tipo] || cores.ajudante;
      return <span style={{ background:cor.bg, color:cor.fg, padding:"3px 10px", borderRadius:"999px", fontSize:"12px", fontWeight:600 }}>{LABEL_TIPO[tipo]||tipo}</span>;
    }
    function FInput({ value, onChange, type="text", disabled, placeholder, autoFocus, onKeyDown }) {
      const [focus, setFocus] = useState(false);
      return <input type={type} value={value} onChange={onChange} disabled={disabled} placeholder={placeholder} autoFocus={autoFocus} onKeyDown={onKeyDown}
        style={{ ...s.inp, ...(focus && !disabled ? { borderColor:T.blue, boxShadow:"0 0 0 2px "+T.blue+"22" } : {}), ...(disabled ? { background:T.soft, color:T.fgSoft } : {}) }}
        onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}/>;
    }
    function StatCard({ label, valor, sub, icon: Icon, color }) {
      return (
        <div style={{ ...s.card, padding:"16px 20px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"8px" }}>
            <span style={{ fontSize:"12px", color:T.fgMuted, fontWeight:500 }}>{label}</span>
            <Icon size={16} color={color || T.fgMuted}/>
          </div>
          <div style={{ fontSize:"28px", fontWeight:700, color:T.fg, lineHeight:1 }}>{valor}</div>
          {sub && <div style={{ fontSize:"12px", color:T.fgMuted, marginTop:"6px" }}>{sub}</div>}
        </div>
      );
    }

    function SelectColorido({ value, onChange, opcoes, mapa, placeholder, onAdicionar }) {
      const [adicionando, setAdicionando] = useState(false);
      const [novoItem, setNovoItem] = useState("");
      const cor = value && mapa ? corBadge(value, mapa) : null;

      const confirmar = () => {
        if (novoItem.trim() && onAdicionar) { onAdicionar(novoItem.trim()); setNovoItem(""); setAdicionando(false); }
      };

      return (
        <div>
          <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
            <select value={value} onChange={onChange}
              style={{ ...s.inp, ...(cor ? { background:cor.bg, color:cor.fg, fontWeight:600 } : {}) }}>
              <option value="">{placeholder || "Selecione..."}</option>
              {opcoes.map(o => <option key={o} value={o}>{o}</option>)}
            </select>
            {onAdicionar && (
              <button type="button" onClick={() => setAdicionando(!adicionando)} style={{ ...s.iconBtn, border:"1px solid "+T.blue, color:T.blue, padding:"8px" }}>
                <Plus size={14}/>
              </button>
            )}
          </div>
          {adicionando && (
            <div style={{ display:"flex", gap:"6px", marginTop:"6px", alignItems:"center" }}>
              <input autoFocus value={novoItem} onChange={e => setNovoItem(e.target.value)} onKeyDown={e => e.key==="Enter" && confirmar()} placeholder="Nome do novo item..." style={{ ...s.inp, flex:1, fontSize:"13px", padding:"8px 10px" }}/>
              <button style={{ ...s.btnBlue, padding:"8px 12px", fontSize:"12px" }} onClick={confirmar}><Check size={13}/></button>
              <button style={{ ...s.btnGhost, padding:"8px 12px", fontSize:"12px" }} onClick={() => { setAdicionando(false); setNovoItem(""); }}><X size={13}/></button>
            </div>
          )}
        </div>
      );
    }

    // ─── DASHBOARD ───────────────────────────────────────────────────────────
    function Dashboard({ envios }) {
      const data = useMemo(() => {
        const total = envios.length;
        const qtdeTotal = envios.reduce((a,e) => a + (Number(e.qtde)||0), 0);
        const divergencias = envios.filter(e => e.statusConferencia === "Divergência").length;
        const entregues = envios.filter(e => e.statusColeta === "Entregue").length;
        const pendentes = envios.filter(e => ["Em Preparação","Preparado"].includes(e.statusColeta)).length;
        const porMarket = envios.reduce((a,e) => { a[e.marketplace] = (a[e.marketplace]||0)+1; return a; }, {});
        const porStatus = envios.reduce((a,e) => { a[e.statusColeta] = (a[e.statusColeta]||0)+1; return a; }, {});
        const porEmb = envios.reduce((a,e) => { if(e.embalador) a[e.embalador] = (a[e.embalador]||0)+1; return a; }, {});
        const porCadastro = {};
        envios.forEach(e => {
          if (!e.cadastro) return;
          if (!porCadastro[e.cadastro]) porCadastro[e.cadastro] = { envios:0, qtde:0 };
          porCadastro[e.cadastro].envios += 1;
          porCadastro[e.cadastro].qtde += Number(e.qtde)||0;
        });
        const rankingCadastros = Object.entries(porCadastro)
          .map(([nome,v]) => ({ nome, ...v }))
          .sort((a,b) => b.qtde - a.qtde || b.envios - a.envios);
        return { total, qtdeTotal, divergencias, entregues, pendentes, porMarket, porStatus, porEmb, rankingCadastros };
      }, [envios]);

      const BarCard = ({ titulo, dados, mapa }) => (
        <div style={s.card}>
          <div style={{ fontSize:"15px", fontWeight:600, marginBottom:"14px" }}>{titulo}</div>
          <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
            {Object.entries(dados).sort((a,b) => b[1]-a[1]).map(([k,v]) => {
              const pct = data.total ? (v/data.total)*100 : 0;
              const cor = mapa ? corBadge(k, mapa) : { bg:T.blue, fg:"#fff" };
              return (
                <div key={k}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"4px" }}>
                    <Badge mapa={mapa}>{k}</Badge>
                    <span style={{ fontSize:"12px", fontWeight:600, color:T.fgMuted }}>{v}</span>
                  </div>
                  <div style={{ height:"5px", background:T.grayBg, borderRadius:"3px", overflow:"hidden" }}>
                    <div style={{ width:pct+"%", height:"100%", background:cor.fg, borderRadius:"3px" }}/>
                  </div>
                </div>
              );
            })}
            {Object.keys(dados).length === 0 && <div style={{ fontSize:"12px", color:T.fgMuted }}>Sem dados ainda.</div>}
          </div>
        </div>
      );

      const RankingCadastros = () => {
        const maxQtde = Math.max(1, ...data.rankingCadastros.map(r => r.qtde));
        const medalhas = ["🥇","🥈","🥉"];
        return (
          <div style={{ ...s.card, gridColumn:"span 2" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"14px" }}>
              <div style={{ fontSize:"15px", fontWeight:600 }}>Ranking de Cadastros — quem manda mais Full</div>
              <div style={{ fontSize:"11px", color:T.fgMuted, textTransform:"uppercase", letterSpacing:".06em" }}>por quantidade</div>
            </div>
            {data.rankingCadastros.length === 0 && <div style={{ fontSize:"12px", color:T.fgMuted }}>Sem cadastros registrados ainda.</div>}
            <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
              {data.rankingCadastros.map((r,i) => {
                const pct = (r.qtde/maxQtde)*100;
                const topTres = i < 3;
                return (
                  <div key={r.nome} style={{ display:"flex", flexDirection:"column", gap:"6px", padding:"10px 12px", borderRadius:rad, background: topTres ? T.yellowBg+"55" : T.soft, border:"1px solid "+(topTres?T.yellowDark:T.border) }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:"10px" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:"10px", flex:1, minWidth:0 }}>
                        <span style={{ fontSize:"18px", width:"28px", textAlign:"center" }}>{medalhas[i] || (i+1)+"º"}</span>
                        <span style={{ fontWeight:700, fontSize:"14px", color:T.fg, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.nome}</span>
                      </div>
                      <div style={{ display:"flex", gap:"14px", alignItems:"center", flexShrink:0 }}>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontSize:"18px", fontWeight:700, color:T.blue, lineHeight:1 }}>{r.qtde.toLocaleString("pt-BR")}</div>
                          <div style={{ fontSize:"10px", color:T.fgMuted, textTransform:"uppercase" }}>unidades</div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontSize:"18px", fontWeight:700, color:T.fg, lineHeight:1 }}>{r.envios}</div>
                          <div style={{ fontSize:"10px", color:T.fgMuted, textTransform:"uppercase" }}>envios</div>
                        </div>
                      </div>
                    </div>
                    <div style={{ height:"6px", background:"#ffffff", borderRadius:"3px", overflow:"hidden", border:"1px solid "+T.border }}>
                      <div style={{ width:pct+"%", height:"100%", background: topTres ? T.yellowDark : T.blue, borderRadius:"3px" }}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      return (
        <div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))", gap:"12px", marginBottom:"20px" }}>
            <StatCard label="Total de Envios" valor={data.total} sub={data.qtdeTotal+" unidades"} icon={Package} color={T.blue}/>
            <StatCard label="Entregues" valor={data.entregues} sub={data.total ? ((data.entregues/data.total)*100).toFixed(0)+"% do total" : "—"} icon={CheckCircle2} color={T.green}/>
            <StatCard label="Em Andamento" valor={data.pendentes} sub="aguardando coleta" icon={Clock} color={T.orange}/>
            <StatCard label="Divergências" valor={data.divergencias} sub={data.total ? ((data.divergencias/data.total)*100).toFixed(1)+"% de incidência" : "—"} icon={AlertTriangle} color={T.red}/>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))", gap:"12px" }}>
            <RankingCadastros/>
            <BarCard titulo="Status da Coleta" dados={data.porStatus} mapa={COR_STATUS_COLETA}/>
            <BarCard titulo="Marketplace" dados={data.porMarket} mapa={COR_MARKETPLACE}/>
            <BarCard titulo="Por Embalador" dados={data.porEmb}/>
          </div>
        </div>
      );
    }

    // ═════════════════════════════════════════════════════════════════════════
    // APP PRINCIPAL
    // ═════════════════════════════════════════════════════════════════════════
    function App() {
      const [usuarios, setUsuarios] = useState([]);
      const [envios, setEnvios] = useState([]);
      const [problemas, setProblemas] = useState([]);
      const [empresas, setEmpresas] = useState(EMPRESAS_DEFAULT);
      const [marketplaces, setMarketplaces] = useState(MARKETPLACES_DEFAULT);
      const [aba, setAba] = useState("dashboard");
      const [carregando, setCarregando] = useState(true);
      const [erro, setErro] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const tudo = await apiListAll();
            setUsuarios(tudo.Usuarios || []);
            setEnvios(tudo.Envios || []);
            setProblemas(tudo.Problemas || []);
            setEmpresas(tudo.Empresas?.length ? tudo.Empresas.map(x=>x.nome) : EMPRESAS_DEFAULT);
            setMarketplaces(tudo.Marketplaces?.length ? tudo.Marketplaces.map(x=>x.nome) : MARKETPLACES_DEFAULT);
            setCarregando(false);
          } catch (err) {
            console.error(err);
            setErro(err.message);
            setCarregando(false);
          }
        })();
      }, []);

      const enviosAtivos = envios.filter(e => !e.historico);
      const enviosHistorico = envios.filter(e => e.historico);

      if (carregando) {
        return (
          <div style={{ display:"grid", placeItems:"center", minHeight:"100vh", gap:"16px" }}>
            <div style={{ width:"40px", height:"40px", border:"3px solid "+T.border, borderTopColor:T.blue, borderRadius:"50%", animation:"spin 1s linear infinite" }}/>
            <div style={{ fontSize:"15px", color:T.fg, fontWeight:600 }}>Conectando ao Google Sheets...</div>
            <style>{"@keyframes spin { to { transform: rotate(360deg); } }"}</style>
          </div>
        );
      }

      if (erro) {
        return (
          <div style={{ display:"grid", placeItems:"center", minHeight:"100vh", padding:"20px" }}>
            <div style={{ maxWidth:"500px", background:T.card, border:"2px solid "+T.red, borderRadius:radLg, padding:"24px" }}>
              <div style={{ fontSize:"18px", fontWeight:700, color:T.redFg, marginBottom:"10px" }}>Erro de conexão</div>
              <div style={{ ...s.alertErr, marginBottom:"14px" }}>{erro}</div>
              <button style={{ ...s.btnBlue, width:"100%", justifyContent:"center" }} onClick={() => window.location.reload()}>Tentar Novamente</button>
            </div>
          </div>
        );
      }

      return (
        <div style={s.app}>
          <div style={s.topbar}>
            <div style={{ display:"flex", alignItems:"center", gap:"12px" }}>
              <div style={s.brandMark}>FS</div>
              <div>
                <div style={{ fontSize:"17px", fontWeight:700, color:T.fg }}>Full Sin · 2026</div>
                <div style={{ fontSize:"11px", color:T.fgMuted }}>Gestão de Envios — ML &amp; Shopee</div>
              </div>
            </div>
            <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
              <button style={s.btnYellow}><Plus size={14}/> Novo Envio</button>
            </div>
          </div>

          <div style={{ display:"flex", padding:"0 32px", borderBottom:"1px solid "+T.border, background:T.card }}>
            {[
              { id:"dashboard", label:"Dashboard", icon:LayoutDashboard },
              { id:"envios", label:"Envios", icon:Package, count:enviosAtivos.length },
              { id:"historico", label:"Histórico", icon:ClipboardCheck, count:enviosHistorico.length },
              { id:"problemas", label:"Problemas", icon:AlertOctagon, count:problemas.length },
              { id:"config", label:"Usuários", icon:Settings, count:usuarios.length },
            ].map(t => {
              const ativa = aba === t.id;
              return (
                <button key={t.id} onClick={() => setAba(t.id)}
                  style={{ padding:"14px 18px", background:"transparent", border:"none", borderBottom: ativa ? "3px solid "+T.blue : "3px solid transparent", color: ativa ? T.blue : T.fgMuted, fontSize:"14px", fontWeight: ativa ? 600 : 400, cursor:"pointer", display:"flex", alignItems:"center", gap:"8px" }}>
                  <t.icon size={14}/>{t.label}
                  {t.count !== undefined && <span style={{ background: ativa ? T.blue : T.grayBg, color: ativa ? "#fff" : T.fgMuted, padding:"2px 8px", borderRadius:"999px", fontSize:"11px", fontWeight:700 }}>{t.count}</span>}
                </button>
              );
            })}
          </div>

          <div style={s.main}>
            {aba === "dashboard" && <Dashboard envios={envios}/>}
            {aba !== "dashboard" && (
              <div style={{ ...s.card, textAlign:"center", padding:"48px", color:T.fgMuted }}>
                <div style={{ fontSize:"16px", fontWeight:600, color:T.fg, marginBottom:"8px" }}>✨ Versão de demonstração</div>
                <div>Este HTML está funcionando e conectado ao seu Google Sheets.</div>
                <div style={{ marginTop:"16px", fontSize:"13px" }}>Me avisa que deu certo aqui, e eu gero a versão completa com todas as abas funcionais!</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Renderiza
    setTimeout(() => {
      ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    }, 300);
  </script>
</body>
</html>
